{% extends "base.html" %}

{% block title %}{{ form_title }} - Менеджер задач{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="mb-0">
                    <i class="fas {% if task %}fa-edit{% else %}fa-plus{% endif %} me-2"></i>
                    {{ form_title }}
                </h3>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label">Название задачи *</label>
                        <input type="text" 
                               class="form-control" 
                               id="title" 
                               name="title" 
                               value="{{ task.title if task else '' }}"
                               required>
                        <div class="form-text">Введите краткое название задачи (до 200 символов)</div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" 
                                  id="description" 
                                  name="description" 
                                  rows="4">{{ task.description if task else '' }}</textarea>
                        <div class="form-text">Подробное описание задачи (необязательно)</div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">Статус</label>
                            <select class="form-select" id="status" name="status">
                                <option value="новая" {% if task and task.status.value == 'новая' %}selected{% endif %}>
                                    Новая
                                </option>
                                <option value="в работе" {% if task and task.status.value == 'в работе' %}selected{% endif %}>
                                    В работе
                                </option>
                                <option value="выполнена" {% if task and task.status.value == 'выполнена' %}selected{% endif %}>
                                    Выполнена
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="priority" class="form-label">Приоритет</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="низкий" {% if task and task.priority.value == 'низкий' %}selected{% endif %}>
                                    Низкий
                                </option>
                                <option value="средний" {% if task and task.priority.value == 'средний' %}selected{% endif %}>
                                    Средний
                                </option>
                                <option value="высокий" {% if task and task.priority.value == 'высокий' %}selected{% endif %}>
                                    Высокий
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="deadline" class="form-label">Дедлайн</label>
                        <input type="datetime-local" 
                               class="form-control" 
                               id="deadline" 
                               name="deadline"
                               {% if task and task.deadline %}
                               value="{{ task.deadline.strftime('%Y-%m-%dT%H:%M') }}"
                               {% endif %}>
                        <div class="form-text">Укажите дату и время выполнения (необязательно)</div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Отмена
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            {% if task %}Сохранить{% else %}Создать{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
